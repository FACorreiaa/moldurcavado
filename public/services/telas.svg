<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Telas placeholder">
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c87f3a"/>
      <stop offset="100%" stop-color="#8b4513"/>
    </linearGradient>
    <pattern id="weave" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#000" opacity="0.04"/>
      <line x1="0" y1="4" x2="8" y2="4" stroke="#fff" stroke-opacity="0.06" stroke-width="1"/>
      <line x1="4" y1="0" x2="4" y2="8" stroke="#fff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#g2)"/>
  <rect width="1200" height="675" fill="url(#weave)"/>
  <g transform="translate(600 320)" fill="none" stroke="#fdfaf6" stroke-opacity="0.85" stroke-width="6" stroke-linejoin="round">
    <rect x="-200" y="-150" width="400" height="300" rx="3"/>
    <line x1="-200" y1="-90" x2="200" y2="-90" stroke-opacity="0.4"/>
    <line x1="-200" y1="90" x2="200" y2="90" stroke-opacity="0.4"/>
    <line x1="-120" y1="-150" x2="-120" y2="150" stroke-opacity="0.4"/>
    <line x1="120" y1="-150" x2="120" y2="150" stroke-opacity="0.4"/>
    <circle cx="-200" cy="-150" r="6" fill="#fdfaf6" fill-opacity="0.9" stroke="none"/>
    <circle cx="200" cy="-150" r="6" fill="#fdfaf6" fill-opacity="0.9" stroke="none"/>
    <circle cx="-200" cy="150" r="6" fill="#fdfaf6" fill-opacity="0.9" stroke="none"/>
    <circle cx="200" cy="150" r="6" fill="#fdfaf6" fill-opacity="0.9" stroke="none"/>
  </g>
  <text x="600" y="555" text-anchor="middle" font-family="Georgia, serif" font-size="42" fill="#fdfaf6" fill-opacity="0.95" font-weight="700" letter-spacing="4">TELAS</text>
  <text x="600" y="600" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" fill="#fdfaf6" fill-opacity="0.65" letter-spacing="6">PLACEHOLDER</text>
